<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Card &times; Sport &middot; Creative Loop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pink:#E6185F;--pink-soft:#FEE6EF;--ink:#0E1A4A;--ink-soft:#5A6482;--muted:#8C93A8;--cream:#FAF8F3;--paper:#fff;--line:#E0DBD0;--line-soft:#EDE9DF}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--cream);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
.brief-head{display:flex;justify-content:space-between;align-items:center;padding:18px 4vw;border-bottom:1px solid var(--line-soft)}
.brief-head .logo{height:24px}
.head-right{display:flex;gap:.9rem;align-items:center;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:500}
.head-right .dot{width:1px;height:12px;background:var(--line)}
.wrap{max-width:1180px;margin:0 auto;padding:5vh 24px 8vh}
section{margin-bottom:6vh}
.eyebrow{display:inline-flex;align-items:center;gap:.6rem;font-size:.74rem;font-weight:600;color:var(--pink);letter-spacing:.18em;text-transform:uppercase;margin-bottom:1.8vh}
.eyebrow::before{content:'';width:28px;height:1.5px;background:var(--pink)}
h1{font-size:clamp(2.2rem,4.6vw,3.4rem);font-weight:700;letter-spacing:-.03em;line-height:1.05;margin-bottom:2vh}
h1 em{font-family:'Instrument Serif',Georgia,serif;font-style:italic;font-weight:400;color:var(--pink)}
.lede{font-size:1.08rem;max-width:66ch;margin-bottom:1.4vh}
.fine{font-size:.85rem;color:var(--ink-soft);max-width:72ch}
h2{font-size:1.15rem;font-weight:700;margin-bottom:1.6vh}
.banked{border-top:1px solid var(--line);padding-top:2.5vh}
.banked-row{display:flex;flex-wrap:wrap;gap:.6rem;align-items:center}
.chip{font-size:.78rem;font-weight:600;background:var(--pink-soft);color:var(--pink);border-radius:99px;padding:5px 14px}
.chip-note{font-size:.76rem;color:var(--muted)}
.ideas-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.8rem;border-top:1px solid var(--line);padding-top:3vh}
.card{background:var(--paper);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s,border-color .15s}
.card.picked{border-color:var(--pink);box-shadow:0 0 0 2px var(--pink-soft)}
.card .media{background:#0E1A4A}
.card .media img{width:100%;max-height:340px;object-fit:cover;display:block}
.card .media.portrait img{object-fit:contain;background:#0E1A4A}
.card .body{padding:1.1rem 1.3rem .6rem}
.steal{font-size:.72rem;color:var(--ink-soft);background:var(--cream);border:1px solid var(--line-soft);border-radius:6px;padding:.45rem .7rem;margin-bottom:.8rem;line-height:1.45}
.steal strong{color:var(--ink)}
.card h3{font-size:1.02rem;font-weight:700;margin-bottom:.4rem}
.card p{font-size:.9rem;max-width:none;margin-bottom:.6rem}
.spec{font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;color:var(--pink);font-weight:600;margin-bottom:.4rem}
.actions{display:flex;gap:1.2rem;padding:.6rem 1.3rem;border-top:1px solid var(--line-soft);align-items:center}
.actions label{font-size:.84rem;font-weight:600;display:flex;gap:.45rem;align-items:center;cursor:pointer;color:var(--ink)}
.actions .more{color:var(--ink-soft);font-weight:500}
.actions input{accent-color:var(--pink);width:16px;height:16px}
.notebox{padding:0 1.3rem .9rem}
.notebox textarea,.globalnotes textarea{width:100%;min-height:56px;border:1px solid var(--line);border-radius:8px;padding:.6rem .8rem;font-family:inherit;font-size:.86rem;background:var(--cream);color:var(--ink);resize:vertical}
.notebox textarea:focus,.globalnotes textarea:focus{outline:none;border-color:var(--pink)}
.globalnotes textarea{min-height:80px;background:var(--paper)}
.promptout pre{background:#0E1A4A;color:#fff;border-radius:10px;padding:1.2rem 1.4rem;font-size:.84rem;white-space:pre-wrap;line-height:1.6;font-family:ui-monospace,Menlo,monospace;margin-bottom:.8rem}
.promptout button{padding:.6rem 1.3rem;border:none;border-radius:8px;background:var(--pink);color:#fff;font-weight:600;font-size:.9rem;cursor:pointer;font-family:inherit}
.brief-foot{display:flex;justify-content:space-between;align-items:center;padding-top:3vh;border-top:1px solid var(--line);font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.brief-foot a{color:var(--muted)}
@media(max-width:860px){.ideas-grid{grid-template-columns:1fr}}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--cream);z-index:100}
#gate-card{text-align:center;padding:3rem}
#gate-card h2{font-size:1.05rem;font-weight:600;margin-bottom:1.3rem}
#gate-form{display:flex;gap:.5rem;justify-content:center}
#gate-input{padding:.55rem .9rem;border:1px solid var(--line);border-radius:6px;font-size:.95rem;font-family:inherit;background:var(--paper);color:var(--ink);width:180px}
#gate-input:focus{outline:none;border-color:var(--pink)}
#gate-btn{padding:.55rem 1.1rem;border:none;border-radius:6px;background:var(--pink);color:#fff;font-weight:600;font-size:.9rem;cursor:pointer;font-family:inherit}
#gate-err{margin-top:.8rem;color:var(--pink);font-size:.8rem;min-height:1em}
body.locked #host{display:none}
</style>
</head>

<script>
function b64ToBytes(b64){const bin=atob(b64);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a}
async function deriveKey(pw,salt,it){const enc=new TextEncoder();const bk=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"])}
async function decryptPayload(pw){const b=JSON.parse(document.getElementById('payload').textContent);const k=await deriveKey(pw,b64ToBytes(b.salt),b.iterations);const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(b.iv)},k,b64ToBytes(b.ciphertext));return new TextDecoder().decode(p)}
let shown=false;
function reveal(h){if(shown)return;shown=true;const host=document.getElementById('host');host.innerHTML=h;host.hidden=false;document.getElementById('gate').style.display='none';document.body.classList.remove('locked');__loopInit()}
async function gateSubmit(e){e.preventDefault();const i=document.getElementById('gate-input'),err=document.getElementById('gate-err');err.textContent='';try{const h=await decryptPayload(i.value);try{localStorage.setItem('cardloop_pw',i.value)}catch(_){};reveal(h)}catch(x){err.textContent='wrong password';i.value='';i.focus()}return false}
(async()=>{try{const c=localStorage.getItem('cardloop_pw');if(c)reveal(await decryptPayload(c))}catch(_){try{localStorage.removeItem('cardloop_pw')}catch(__){}}})();
function __loopInit(){

(function(){
  const cards = document.querySelectorAll('.card');
  const gen = document.getElementById('promptgen');
  const gnotes = document.getElementById('gnotes');
  const KEY = 'cardloop_r1r_state';
  function state(){
    const picks = [];
    cards.forEach(c => {
      const t = c.querySelector('.tick').checked;
      const m = c.querySelector('.morelike').checked;
      const note = c.querySelector('textarea').value.trim();
      if (t || m || note) picks.push({id: c.dataset.id, title: c.dataset.title, pick: t, more: m, note});
    });
    return {picks, global: gnotes.value.trim()};
  }
  function render(){
    const s = state();
    const picked = s.picks.filter(p => p.pick);
    const more = s.picks.filter(p => p.more && !p.pick);
    let out = '';
    if (!picked.length && !more.length && !s.global) { gen.textContent = 'no picks yet — tick ideas above and this prompt writes itself'; save(); return; }
    out += 'round 1R picks from card-sport creative loop:\n';
    picked.forEach(p => { out += `- PICK ${p.id} · ${p.title}` + (p.note ? ` — note: ${p.note}` : '') + '\n'; });
    more.forEach(p => { out += `- MORE LIKE ${p.id} · ${p.title}` + (p.note ? ` — note: ${p.note}` : '') + '\n'; });
    s.picks.filter(p => !p.pick && !p.more && p.note).forEach(p => { out += `- NOTE on ${p.id} · ${p.title}: ${p.note}\n`; });
    if (s.global) out += `global: ${s.global}\n`;
    out += 'next: bring the next round.';
    gen.textContent = out;
    save();
  }
  function save(){ try { localStorage.setItem(KEY, JSON.stringify({s: state(), t: Date.now()})); } catch(e){} }
  function load(){
    try {
      const raw = localStorage.getItem(KEY); if (!raw) return;
      const {s} = JSON.parse(raw);
      s.picks.forEach(p => {
        const c = document.querySelector(`.card[data-id="${p.id}"]`); if (!c) return;
        c.querySelector('.tick').checked = p.pick;
        c.querySelector('.morelike').checked = p.more;
        c.querySelector('textarea').value = p.note || '';
        c.querySelector('.notebox').hidden = !(p.pick || p.note);
        c.classList.toggle('picked', p.pick);
      });
      gnotes.value = s.global || '';
    } catch(e){}
  }
  cards.forEach(c => {
    c.querySelector('.tick').addEventListener('change', e => {
      c.classList.toggle('picked', e.target.checked);
      c.querySelector('.notebox').hidden = !e.target.checked && !c.querySelector('textarea').value.trim();
      render();
    });
    c.querySelector('.morelike').addEventListener('change', render);
    c.querySelector('textarea').addEventListener('input', render);
  });
  gnotes.addEventListener('input', render);
  document.getElementById('copybtn').addEventListener('click', () => {
    navigator.clipboard.writeText(gen.textContent).then(() => {
      const b = document.getElementById('copybtn'); b.textContent = 'Copied'; setTimeout(() => b.textContent = 'Copy prompt', 1400);
    });
  });
  load(); render();
})();

}
</script>
